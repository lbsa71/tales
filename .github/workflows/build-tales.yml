name: Build Tales

on:
  push:
    branches: [main]
    paths:
      - 'stories/**/chapters/**'
      - 'stories/**/translations/**/kapitel/**'
      - '.github/workflows/build-tales.yml'
  workflow_dispatch:

permissions:
  contents: write

# Serialize runs so the commit/push can't race another run.
concurrency:
  group: build-tales
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Full history so each story's last-commit time is resolvable below.
          fetch-depth: 0

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-fonts-recommended texlive-latex-extra

      - name: Build all tales
        run: |
          shopt -s nullglob
          mkdir -p compiled
          FAILED=""

          # stem | title | lang | chapters_glob
          STORIES=(
            "unsung-heroes|Unsung Heroes|en|stories/unsung-heroes/chapters/chapter_*.md"
            "obesjungna-hjaltar|Obesjungna hjältar|sv|stories/unsung-heroes/translations/svenska/kapitel/kapitel_*.md"
            "a-rabbits-life|A Rabbit's Life|en|stories/zelda/chapters/chapter_*.md"
            "en-kanins-liv|En kanins liv|sv|stories/zelda/translations/svenska/kapitel/kapitel_*.md"
            "continue|Continue|en|stories/continue/chapters/chapter_*.md"
            "science-fiction-4|Science/Fiction 4.0|en|stories/sf4/chapters/chapter_*.md"
            "non-serviam-ex-umbra|Non Serviam Ex Umbra|en|stories/non-serviam-ex-umbra/chapters/chapter_*.md"
            "resebrev|Resebrev|sv|stories/resebrev/chapters/chapter_*.md"
            "resebrev-svenska|Resebrev|sv|stories/resebrev/translations/svenska/kapitel/kapitel_*.md"
            "seem|Seem|en|stories/seem/chapters/episode_*.md"
            "seem-upplasning-sv|Seem (uppläsning)|sv|stories/seem/translations/svenska.uppläsning/kapitel/kapitel_*.md"
            "stay|Stay|en|stories/stay/chapters/tape_*.md"
          )

          for entry in "${STORIES[@]}"; do
            IFS='|' read -r stem title lang glob <<< "$entry"
            CHAPTERS=( $glob )
            if [ ${#CHAPTERS[@]} -eq 0 ]; then
              echo "::notice::No chapters found for $stem — skipping."
              continue
            fi
            mapfile -t CHAPTERS < <(printf '%s\n' "${CHAPTERS[@]}" | sort)

            # Concatenated markdown (truncates compiled/$stem.md)
            cat "${CHAPTERS[@]}" > "compiled/$stem.md"

            # Deterministic PDF dates/IDs so unchanged stories don't churn.
            # pdfTeX bakes wall-clock CreationDate/ModDate plus a time-seeded
            # trailer /ID into every build; pin them to the story's last commit
            # so identical prose produces byte-identical output.
            EPOCH="$(git log -1 --format=%ct -- "${CHAPTERS[@]}")"
            : "${EPOCH:=1700000000}"

            # PDF via pandoc — keep going if one story fails, but flag it
            if ! SOURCE_DATE_EPOCH="$EPOCH" FORCE_SOURCE_DATE=1 pandoc "${CHAPTERS[@]}" \
                -o "compiled/$stem.pdf" \
                --pdf-engine=pdflatex \
                --resource-path="$(dirname "${CHAPTERS[0]}")" \
                --toc --toc-depth=1 \
                -V geometry:margin=1in \
                -V documentclass=report \
                -V title="$title" \
                -V lang="$lang"; then
              echo "::error::PDF build failed for $stem"
              FAILED="$FAILED $stem"
            fi
          done

          echo "FAILED=$FAILED" >> "$GITHUB_ENV"

      - name: Commit and push compiled/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add compiled/
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "chore: rebuild compiled tales [skip ci]"
          git pull --rebase origin main
          git push

      - name: Flag build failures
        if: ${{ env.FAILED != '' }}
        run: |
          echo "::error::Stories failed to build:${{ env.FAILED }}"
          exit 1
