name: Build PDF

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'chapters/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-fonts-recommended texlive-latex-extra

      - name: Build PDF from chapters
        run: |
          # Collect all chapter files sorted by filename to maintain chapter order
          CHAPTERS=$(ls chapters/chapter_*.md | sort)
          pandoc $CHAPTERS \
            -o continue.pdf \
            --pdf-engine=pdflatex \
            --resource-path=chapters \
            --toc \
            --toc-depth=1 \
            -V geometry:margin=1in \
            -V documentclass=report \
            -V title="Continue"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: continue-pdf
          path: continue.pdf
          retention-days: 30
